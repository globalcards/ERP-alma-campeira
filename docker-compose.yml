# Stack local de desenvolvimento: PostgreSQL only
# Uso:
#   docker compose up -d

services:
  db:
    image: postgres:16
    container_name: erp_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: erp_alma
    ports:
      - "5432:5432"
    volumes:
      - erp_dbdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d erp_alma"]
      interval: 5s
      timeout: 5s
      retries: 12

volumes:
  erp_dbdata:
